name:node Ci
on:
  push:

  jobs:
    build:
        runs-on: ubuntu-latest
        steps:  
        - uses:action/checkout@v4
        - name: Use Node.js
          uses: actions/setup-node@v3
          with:
            node-version: '18'
        - run: npm install
        - run: npm test
        - run: npm run build
